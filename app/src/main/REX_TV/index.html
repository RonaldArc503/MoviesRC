<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="webOS" content="width=device-width, initial-scale=1.0">
    <title>REX - Películas y Series</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Pantalla de carga -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner"></div>
        <p>Cargando...</p>
    </div>

    <!-- Home -->
    <div id="homePage" class="page active">
        <div class="header">
            <div class="logo">
                <h1>REX</h1>
            </div>
            <div class="search-area">
                <input type="text" id="searchInput" placeholder="Buscar..." class="search-input">
                <button id="searchBtn" class="search-btn">🔍</button>
            </div>
        </div>
        <div id="sectionsContainer" class="sections-container"></div>
    </div>

    <!-- Detalle (similar a DetalleActivity) -->
    <div id="detailPage" class="page">
        <div class="detail-container">
            <div class="detail-backdrop" id="detailBackdrop"></div>
            <div class="detail-gradient"></div>
            
            <div class="detail-content">
                <div class="detail-left">
                    <button class="back-button" id="backButton">← Volver</button>
                    <div class="badges">
                        <span class="badge-type" id="badgeType">PELÍCULA</span>
                        <span class="badge-quality" id="badgeQuality">HD</span>
                    </div>
                    <h1 class="detail-title" id="detailTitle"></h1>
                    <div class="detail-meta">
                        <span class="detail-year" id="detailYear"></span>
                        <span class="detail-rating" id="detailRating">★ 0.0</span>
                        <span class="detail-seasons" id="detailSeasons"></span>
                    </div>
                    <p class="detail-synopsis" id="detailSynopsis"></p>
                    <div class="detail-genres" id="detailGenres"></div>
                    <div class="detail-buttons">
                        <button class="btn-play" id="playButton">▶ Reproducir</button>
                        <button class="btn-mylist" id="mylistButton">+ Mi Lista</button>
                    </div>
                </div>
                <div class="detail-right" id="episodesPanel">
                    <div class="episodes-header">
                        <h3>Episodios</h3>
                        <select id="seasonSelect" class="season-select"></select>
                    </div>
                    <div class="episodes-list" id="episodesList"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Reproductor (similar a PlayerContenidoActivity) -->
    <div id="playerPage" class="page">
        <div class="player-container">
            <button class="close-player" id="closePlayerBtn">✕</button>
            <iframe id="playerFrame" class="player-frame" allow="autoplay; fullscreen"></iframe>
            <div class="player-controls" id="playerControls">
                <button id="nextEpisodeBtn" class="next-episode-btn" style="display: none;">Siguiente Episodio ▶</button>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/navigation.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
